{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In – EggDetect AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: contrast(1.1) brightness(0.7);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Secure Overlay */
        .secure-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .secure-overlay.fade-out { opacity: 0; pointer-events: none; }
        .secure-spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .auth-card {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem 1.5rem;
            width: 95%;
            max-width: 440px;

            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            display: none; /* Hidden until secure link established */
        }
        .auth-card.active { display: block; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 800;
            font-size: 1.8rem;
            color: #fbbf24;
            text-decoration: none;
            display: flex;
            align-items: center; justify-content: center; gap: 0.5rem;
        }

        .secure-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center; gap: 6px;
            margin-bottom: 20px;
        }

        .form-label { font-weight: 600; color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 8px; display: block; }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 0.8rem 1rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fbbf24;
            color: #fff;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }

        /* CAPTCHA */
        .captcha-box {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center; gap: 10px;
            margin-bottom: 15px;
        }
        .captcha-text {
            font-family: monospace;
            font-weight: 800;
            letter-spacing: 4px;
            color: #fbbf24;
            font-size: 1.2rem;
            user-select: none;
        }
        .btn-refresh { background: none; border: none; color: #666; font-size: 1.1rem; }
        .btn-refresh:hover { color: #fff; }

        .btn-auth {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 800;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-auth:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3); }
        .footer-link { text-align: center; margin-top: 2rem; color: rgba(255,255,255,0.5); font-size: 0.9rem; }
        .footer-link a { color: #fbbf24; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body class="login-page">
    <video autoplay muted loop playsinline class="video-bg">
        <source src="{% static 'images/Video_Ready.mp4' %}" type="video/mp4">
    </video>


    <!-- Secure Bridge Overlay -->

    <div class="secure-overlay" id="secureOverlay">
        <div class="secure-spinner"></div>
        <p style="font-weight: 600; letter-spacing: 1px; color: #fbbf24;">ESTABLISHING SECURE BRIDGE...</p>
    </div>

    <div class="auth-card" id="authCard">
        <a href="/" class="brand-logo">
            <i class="bi bi-egg-fill"></i> EggDetect AI
        </a>
        
        <div class="secure-badge">
            <i class="bi bi-shield-check"></i> END-TO-END ENCRYPTED
        </div>

        <h2 class="h5 mb-4" style="font-weight: 800;">Member Access</h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-warning py-2 small border-0 bg-warning text-dark fw-bold mb-3" style="border-radius: 10px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form action="{% url 'userlogin' %}" method="POST" id="loginForm">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Identifier</label>
                <input type="text" name="username" class="form-control" placeholder="Username / Email / Mobile" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Security Key</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required />
            </div>

            <label class="form-label">Verification</label>
            <div class="captcha-box">
                <div class="captcha-text" id="captchaValue">Q7R2T</div>
                <button type="button" class="btn-refresh" onclick="regenerateCaptcha()"><i class="bi bi-arrow-clockwise"></i></button>
                <input type="text" id="captchaInput" class="form-control py-1" placeholder="Type letters" style="width: 120px;" required />
            </div>

            <button type="submit" class="btn btn-auth">Authenticate</button>
        </form>

        <div class="footer-link">
            Need an account? <a href="{% url 'registration' %}">Join the AI Network</a>
        </div>
    </div>

    <script>
        // Transition from secure overlay to login card
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('secureOverlay').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('authCard').classList.add('active');
                }, 400);
            }, 1800);
        });

        // Simple CAPTCHA logic
        let captchaCode = '';
        function regenerateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            captchaCode = '';
            for(let i=0; i<5; i++) captchaCode += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('captchaValue').innerText = captchaCode;
        }
        regenerateCaptcha();

        document.getElementById('loginForm').onsubmit = (e) => {
            const input = document.getElementById('captchaInput').value.toUpperCase();
            if(input !== captchaCode) {
                alert('Invalid verification code. Please try again.');
                regenerateCaptcha();
                e.preventDefault();
                return false;
            }
        };
    </script>
</body>
</html>
