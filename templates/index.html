{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EggDetect AI - Login</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="logo-section">
            <div class="logo-icon">🥚</div>
            <h1 class="logo-title">EggDetect AI</h1>
            <p class="logo-subtitle">Deep Learning Crack Detection System</p>
        </div>

        <div id="loginForm" class="auth-form">
            <h2>Welcome Back</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username or Email</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <p class="switch-form">Don't have an account? <a href="#" onclick="showRegister()">Register here</a></p>
        </div>

        <div id="registerForm" class="auth-form" style="display:none">
            <h2>Create Account</h2>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword" required>
                </div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
            <p class="switch-form">Already have an account? <a href="#" onclick="showLogin()">Login here</a></p>
        </div>

        <div class="admin-access" onclick="handleAdminAccess(event)"></div>
    </div>

    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
