{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Vault – EggDetect AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: contrast(1.1) brightness(0.6);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.3) 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 0;
            pointer-events: none;
        }
        .admin-vault {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(251, 191, 36, 0.2);
            border-radius: 20px;
            padding: 3rem 1.5rem;
            width: 95%;
            max-width: 450px;

            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        .vault-icon {
            font-size: 3rem;
            color: #fbbf24;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.5));
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.1);
            color: #fff;
        }
        .btn-vault {
            background: #fbbf24;
            color: #000;
            width: 100%;
            padding: 0.9rem;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            transition: all 0.3s;
        }
        .btn-vault:hover { background: #fff; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
    </style>
</head>
<body class="admin-page">
    <video autoplay muted loop playsinline class="video-bg">
        <source src="{% static 'images/Video_Ready.mp4' %}" type="video/mp4">
    </video>

    <div class="admin-vault">
        <div class="vault-icon"><i class="bi bi-shield-lock-fill"></i></div>
        <h1 class="h3 mb-1" style="font-weight: 800; letter-spacing: 1px;">Admin Vault</h1>
        <p class="text-muted mb-4 small">Restricted System Access</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 small border-0 bg-danger text-white mb-4">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form action="{% url 'admin_login' %}" method="POST" class="text-start">
            {% csrf_token %}
            <input type="text" name="username" class="form-control" placeholder="Vault Identifier" required />
            <input type="password" name="password" class="form-control" placeholder="Key Passcode" required />
            <button type="submit" class="btn btn-vault mt-3">Decrypt & Enter</button>
        </form>

        <a href="/" class="text-white opacity-50 text-decoration-none mt-4 d-inline-block small"><i class="bi bi-chevron-left"></i> Abort & Return</a>
    </div>

</body>
</html>
